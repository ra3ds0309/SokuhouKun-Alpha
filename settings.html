<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <title>速報くんα - 設定</title>
    <link rel="stylesheet" href="style.css">
    <style>
        /* 設定ページ専用の背景 */
        body { background: #1a1a1a; overflow-y: auto; padding: 40px; }
        .settings-container { max-width: 800px; margin: 0 auto; background: #222; padding: 30px; border-radius: 12px; border: 1px solid #333; }
        h2 { border-bottom: 2px solid #d32f2f; padding-bottom: 10px; }
        .btn-group { margin-top: 30px; display: flex; gap: 10px; }
        .back-link { color: #aaa; text-decoration: none; font-size: 14px; }
        .back-link:hover { text-decoration: underline; }
    </style>
</head>
<body>
    <div class="settings-container">
        <h2>速報くんα 設定</h2>
        
        <section>
            <h3>フォント設定</h3>
            <select id="font-select">
                <option value="'UD Shin Go', sans-serif">UD新ゴ</option>
                <option value="'UD Kakugo', sans-serif">UD角ゴ</option>
                <option value="'New Rodin', sans-serif">ニューロダン</option>
                <option value="'Rodin NTLG', sans-serif">ロダンNTLG</option>
            </select>
        </section>

        <section>
            <h3>ライブカメラ登録（最大10件）</h3>
            <div id="camera-inputs"></div>
        </section>

        <div class="btn-group">
            <button id="save-settings" style="background:#d32f2f;">設定を保存して戻る</button>
            <a href="index.html" class="back-link" style="margin-top:15px; display:block;">保存せずに戻る</a>
        </div>
    </div>

    <script>
        // 設定ページ専用の簡易スクリプト
        let settings = { font: "'UD Shin Go', sans-serif", cameras: [] };

        function load() {
            const saved = localStorage.getItem('sokuhoSettings');
            if (saved) {
                settings = JSON.parse(saved);
                document.getElementById('font-select').value = settings.font;
            }
            const container = document.getElementById('camera-inputs');
            for (let i = 0; i < 10; i++) {
                const cam = settings.cameras[i] || { url: "", location: "" };
                container.innerHTML += `<div style="display:flex; gap:10px; margin-bottom:10px;">
                    <input type="text" class="cam-loc" value="${cam.location}" placeholder="場所" style="width:120px; background:#333; color:white; border:1px solid #555; padding:8px;">
                    <input type="text" class="cam-url" value="${cam.url}" placeholder="iframeのURL" style="flex-grow:1; background:#333; color:white; border:1px solid #555; padding:8px;">
                </div>`;
            }
        }

        document.getElementById('save-settings').onclick = () => {
            settings.font = document.getElementById('font-select').value;
            const urls = document.getElementsByClassName('cam-url');
            const locs = document.getElementsByClassName('cam-loc');
            settings.cameras = [];
            for (let i = 0; i < urls.length; i++) {
                let val = urls[i].value.trim();
                if (val) {
                    if (val.includes("<iframe")) {
                        const match = val.match(/src=["'](.+?)["']/);
                        val = match ? match[1] : val;
                    }
                    settings.cameras.push({ url: val, location: locs[i].value });
                }
            }
            localStorage.setItem('sokuhoSettings', JSON.stringify(settings));
            window.location.href = "index.html"; // 保存して戻る
        };

        load();
    </script>
</body>
</html>
