<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <title>速報くんα - 設定</title>
    <link rel="stylesheet" href="style.css">
    <style>
        body { background: #1a1a1a; overflow-y: auto; padding: 40px; pointer-events: auto; }
        .settings-container { max-width: 900px; margin: 0 auto; background: #222; padding: 30px; border-radius: 12px; border: 1px solid #333; }
        h2 { border-bottom: 2px solid #d32f2f; padding-bottom: 10px; margin-top: 0; }
        .section-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; margin-bottom: 20px; }
        .test-zone { background: #2a2a2a; padding: 20px; border-radius: 8px; margin-bottom: 20px; border: 1px dashed #555; }
        input[type="text"], input[type="number"], select { background: #333; color: white; border: 1px solid #555; padding: 8px; border-radius: 4px; width: 100%; box-sizing: border-box; }
        input[type="color"] { background: none; border: none; width: 50px; height: 35px; cursor: pointer; }
        button { background: #d32f2f; color: white; border: none; padding: 12px 25px; border-radius: 4px; cursor: pointer; font-weight: bold; }
        
        /* 管理ボタン用のスタイル */
        .admin-buttons { margin-top: 30px; display: flex; align-items: center; gap: 10px; border-top: 1px solid #444; padding-top: 20px; }
        .btn-export { background: #444; }
        .btn-import { background: #666; }
    </style>
</head>
<body>
    <div class="settings-container">
        <h2>速報くんα 詳細設定</h2>

        <section class="test-zone">
            <h3>テスト速報送信</h3>
            <div style="display: flex; gap: 10px;">
                <input type="text" id="test-text" placeholder="表示内容">
                <button id="btn-send-test" style="background: #007bff;">効果音付きで送信</button>
            </div>
        </section>
        
        <div class="section-grid">
            <section>
                <h3>時計・地名設定</h3>
                <label>フォント:</label>
                <select id="clock-font">
                    <option value="'UD Shin Go', sans-serif">UD新ゴ</option>
                    <option value="'UD Kakugo', sans-serif">UD角ゴ</option>
                    <option value="'New Rodin', sans-serif">ニューロダン</option>
                    <option value="'Rodin NTLG', sans-serif">ロダンNTLG</option>
                </select>
            </section>

            <section>
                <h3>速報テロップ設定</h3>
                <label>フォント:</label>
                <select id="ticker-font">
                    <option value="'UD Shin Go', sans-serif">UD新ゴ</option>
                    <option value="'UD Kakugo', sans-serif">UD角ゴ</option>
                    <option value="'New Rodin', sans-serif">ニューロダン</option>
                    <option value="'Rodin NTLG', sans-serif">ロダンNTLG</option>
                </select>
                <div style="display:flex; gap:10px; margin-top:10px; align-items:center;">
                    <div>文字色: <input type="color" id="ticker-color"></div>
                    <div>縁色: <input type="color" id="ticker-stroke-color"></div>
                    <div style="flex-grow:1;">縁の太さ: <input type="number" id="ticker-stroke-width" min="0" max="20" step="1"></div>
                </div>
            </section>
        </div>

        <section>
            <h3>ライブカメラ登録</h3>
            <div id="camera-inputs"></div>
        </section>

        <div class="admin-buttons">
            <button id="save-settings">設定を保存する</button>
            <button id="export-settings" class="btn-export">設定を書き出す</button>
            <button id="import-trigger" class="btn-import">設定を読み込む</button>
            <input type="file" id="import-file" style="display:none" accept=".json">
            <p id="save-status" style="display:inline; margin-left:5px; color:#4caf50;"></p>
        </div>
    </div>

    <script>
        const bc = new BroadcastChannel('sokuho_channel');
        let settings = {
            clockFont: "'UD Shin Go', sans-serif",
            tickerFont: "'UD Shin Go', sans-serif",
            tickerColor: "#ffffff",
            tickerStrokeColor: "#000000",
            tickerStrokeWidth: 7,
            cameras: []
        };

        // UIに入力値を反映させる関数
        function applyToUI(data) {
            document.getElementById('clock-font').value = data.clockFont || data.font || "";
            document.getElementById('ticker-font').value = data.tickerFont || data.font || "";
            document.getElementById('ticker-color').value = data.tickerColor || "#ffffff";
            document.getElementById('ticker-stroke-color').value = data.tickerStrokeColor || "#000000";
            document.getElementById('ticker-stroke-width').value = data.tickerStrokeWidth || 7;

            const container = document.getElementById('camera-inputs');
            container.innerHTML = ""; // 一旦クリア
            for (let i = 0; i < 10; i++) {
                const cam = data.cameras[i] || { url: "", location: "" };
                container.innerHTML += `<div style="display:flex; gap:10px; margin-bottom:10px;">
                    <input type="text" class="cam-loc" value="${cam.location}" placeholder="場所" style="width:120px;">
                    <input type="text" class="cam-url" value="${cam.url}" placeholder="URLまたはiframe" style="flex-grow:1;">
                </div>`;
            }
        }

        function init() {
            const saved = localStorage.getItem('sokuhoSettings');
            if (saved) settings = JSON.parse(saved);
            applyToUI(settings);
        }

        document.getElementById('btn-send-test').onclick = () => {
            const text = document.getElementById('test-text').value;
            if(text) bc.postMessage({ type: 'TEST_SOKUHO', text: text });
        };

        // 保存処理
        document.getElementById('save-settings').onclick = () => {
            const data = collectCurrentSettings();
            localStorage.setItem('sokuhoSettings', JSON.stringify(data));
            document.getElementById('save-status').innerText = "保存完了！";
            setTimeout(() => document.getElementById('save-status').innerText = "", 2000);
        };

        // 現在の入力欄からデータを集める関数
        function collectCurrentSettings() {
            const data = {
                clockFont: document.getElementById('clock-font').value,
                tickerFont: document.getElementById('ticker-font').value,
                tickerColor: document.getElementById('ticker-color').value,
                tickerStrokeColor: document.getElementById('ticker-stroke-color').value,
                tickerStrokeWidth: document.getElementById('ticker-stroke-width').value,
                cameras: []
            };
            const urls = document.getElementsByClassName('cam-url');
            const locs = document.getElementsByClassName('cam-loc');
            for (let i = 0; i < urls.length; i++) {
                let val = urls[i].value.trim();
                if (val) {
                    if (val.includes("<iframe")) {
                        const match = val.match(/src=["'](.+?)["']/);
                        val = match ? match[1] : val;
                    }
                    data.cameras.push({ url: val, location: locs[i].value });
                }
            }
            return data;
        }

        // --- エクスポート ---
        document.getElementById('export-settings').onclick = () => {
            const data = collectCurrentSettings(); // 最新の入力状態を書き出す
            const blob = new Blob([JSON.stringify(data, null, 2)], { type: 'application/json' });
            const url = URL.createObjectURL(blob);
            const a = document.createElement('a');
            const now = new Date();
            const dateStr = now.getFullYear() + String(now.getMonth() + 1).padStart(2, '0') + String(now.getDate()).padStart(2, '0');
            
            a.href = url;
            a.download = `sokuho_settings_${dateStr}.json`;
            a.click();
            URL.revokeObjectURL(url);
        };

        // --- インポート ---
        const fileInput = document.getElementById('import-file');
        document.getElementById('import-trigger').onclick = () => fileInput.click();

        fileInput.onchange = (e) => {
            const file = e.target.files[0];
            if (!file) return;

            const reader = new FileReader();
            reader.onload = (event) => {
                try {
                    const json = JSON.parse(event.target.result);
                    // 簡易チェック
                    if (json.cameras) {
                        applyToUI(json);
                        alert("設定を読み込みました。「保存」を押すと確定されます。");
                    } else {
                        alert("有効な設定ファイルではありません。");
                    }
                } catch (err) {
                    alert("ファイルの読み込みに失敗しました。");
                }
            };
            reader.readAsText(file);
        };

        init();
    </script>
</body>
</html>
