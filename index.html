<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <title>速報くんα - メイン</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div id="video-container"><div id="player"></div></div>

    <div id="ui-overlay">
        <div id="header-container">
            <div id="info-box">
                <div id="clock-display">00:00</div>
                <div id="camera-location">カメラ場所</div>
            </div>
            <div id="ticker-container" class="hidden">
                <div id="ticker-content">速報内容</div>
            </div>
        </div>
        <div id="url-box"><span id="camera-url-display">URL</span></div>
    </div>

    <a href="settings.html" id="fixed-settings-trigger" title="設定を開く">⚙</a>

    <div id="error-container"></div>

    <script src="https://www.youtube.com/iframe_api"></script>
    <script src="script.js"></script>
</body>
</html>
